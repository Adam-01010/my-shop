name: Проверка Python кода
on:
  pull_request:
    branches: [ main ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Скачиваем код
        uses: actions/checkout@v4

      - name: Настраиваем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
        
      - name: Запускаем наш тест
        run: python test_calculator.py
